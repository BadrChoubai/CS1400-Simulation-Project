<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/favicon.ico" />
    <link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/favicon.ico" />

    {% seo %}

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.green.min.css" />

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        .skip-link {
            position: absolute;
            top: -100%;
            left: 0;
        }

        .skip-link:focus {
            top: 0;
        }
    </style>
</head>

<body>
    <a class="skip-link" href="#content">Skip to main content</a>
    <header class="container">
        {% if page.url != "/" %} {% include nav.html %} {% endif %}
    </header>
    <main class="container" id="content">{{ content }}</main>
    <footer class="container">
        <small>
            Built by
            <a href="https://www.badrchoubai.dev">Badr Choubai</a> &mdash; for
            students at Metropolitan State University of Denver
        </small>
    </footer>
</body>

</html>
